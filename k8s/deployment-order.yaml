apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-order-api
  labels:
    app: ecommerce-order   # 🔥 agrupa toda la app
    service: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-order
  template:
    metadata:
      labels:
        app: ecommerce-order
    spec:
      containers:
        - name: ecommerce-order
          image: localhost:5000/ecommerce-order:5
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: USER_SERVICE_URL
              value: http://ecommerce-inventory:8089
            - name: DB_URL
              value: jdbc:postgresql://postgres:5432/amazon_microservice
            - name: DB_USER
              value: postgres
            - name: DB_PASS
              value: postgres
            - name: KAFKA_SERVER
              value: kafka:9092
            - name: SCHEMA_REGISTRY
              value: http://schema-registry:8081